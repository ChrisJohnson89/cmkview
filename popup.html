<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #111113;
    --surface: #1a1a1e;
    --surface2: #222228;
    --border: #2a2a30;
    --text: #e0e0e4;
    --text-dim: #888890;
    --down-bg: #3d1130;
    --down-border: #7a2260;
    --down-text: #ff66cc;
    --down-accent: #ff44bb;
    --crit-bg: #3d1114;
    --crit-border: #7a2228;
    --crit-text: #ff6b6b;
    --crit-accent: #ff4444;
    --warn-bg: #3d3411;
    --warn-border: #7a6a22;
    --warn-text: #ffd666;
    --warn-accent: #ffcc00;
    --unkn-bg: #3d2811;
    --unkn-border: #7a5222;
    --unkn-text: #ffb366;
    --unkn-accent: #ff9933;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body.size-sm { zoom: 0.85; }
  body.size-md { zoom: 1.1; }
  body.size-lg { zoom: 1.25; }

  .update-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #18181c;
    border-bottom: 1px solid #30303a;
    color: var(--text-dim);
    font-size: 12px;
  }

  .update-banner-text {
    flex: 1;
    line-height: 1.4;
  }

  .update-banner strong {
    color: var(--text);
    font-weight: 600;
  }

  .update-banner a {
    color: #8fd19e;
    font-weight: 600;
    text-decoration: none;
  }

  .update-banner a:hover {
    text-decoration: underline;
  }

  .update-banner-dismiss {
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }

  .update-banner-dismiss:hover {
    color: var(--text);
  }

  /* === Header bar === */
  .header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 16px 10px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header .left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .header .brand {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.3px;
  }

  @media (max-width: 400px) {
    .header .brand { display: none; }
  }

  .filters {
    display: flex;
    gap: 4px;
  }

  .filter-btn {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .filter-btn:hover { border-color: #555; color: var(--text); }
  .filter-btn.active { background: #2a3a2a; color: #6b6; border-color: #3a5a3a; }

  .header .summary {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    align-items: center;
  }

  .summary .badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 11px;
    font-family: "SF Mono", "Menlo", monospace;
  }

  .badge.down { background: var(--down-bg); color: var(--down-text); border: 1px solid var(--down-border); cursor: pointer; user-select: none; transition: all 0.15s; }
  .badge.crit { background: var(--crit-bg); color: var(--crit-text); border: 1px solid var(--crit-border); cursor: pointer; user-select: none; transition: all 0.15s; }
  .badge.warn { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); cursor: pointer; user-select: none; transition: all 0.15s; }
  .badge.unkn { background: var(--unkn-bg); color: var(--unkn-text); border: 1px solid var(--unkn-border); cursor: pointer; user-select: none; transition: all 0.15s; }

  .badge.off {
    opacity: 0.3;
    filter: saturate(0.2);
  }
  .badge:hover { filter: brightness(1.3); }
  .badge.off:hover { opacity: 0.5; filter: saturate(0.2) brightness(1.3); }

  /* === Content area === */
  .content { padding: 12px 16px; }

  /* === Group card === */
  .group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .group-header:hover { background: var(--surface2); }

  .group-icon {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    min-width: 32px;
    text-align: center;
  }

  .group-title {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
  }

  .group-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
    font-family: "SF Mono", "Menlo", monospace;
  }

  .group-meta .count { font-weight: 600; }

  .group-state {
    font-weight: 700;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .group-state.DOWN  { background: var(--down-bg); color: var(--down-text); border: 1px solid var(--down-border); }
  .group-state.CRIT  { background: var(--crit-bg); color: var(--crit-text); border: 1px solid var(--crit-border); }
  .group-state.WARN  { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); }
  .group-state.UNKN  { background: var(--unkn-bg); color: var(--unkn-text); border: 1px solid var(--unkn-border); }

  .chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .group.open .chevron { transform: rotate(90deg); }

  /* === Host rows inside group === */
  .group-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .group.open .group-body { display: block; }

  .host-row {
    padding: 6px 14px 6px 44px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .host-row:last-child { border-bottom: none; }
  .host-row:hover { background: var(--surface2); }

  .host-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .host-name {
    font-weight: 600;
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 12px;
  }

  .host-flags { font-size: 10px; color: var(--text-dim); }

  .host-meta {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    font-family: "SF Mono", "Menlo", monospace;
  }

  /* === Service items inside host === */
  .service-items {
    display: none;
    padding: 4px 0 4px 20px;
  }

  .host-row.expanded .service-items { display: block; }

  .svc-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    font-size: 11px;
    color: var(--text-dim);
  }

  .svc-label {
    font-weight: 600;
    color: var(--text);
    min-width: 100px;
    font-size: 11px;
  }

  .svc-badge {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    min-width: 34px;
    text-align: center;
  }

  .svc-badge.DOWN { background: var(--down-bg); color: var(--down-text); }
  .svc-badge.CRIT { background: var(--crit-bg); color: var(--crit-text); }
  .svc-badge.WARN { background: var(--warn-bg); color: var(--warn-text); }
  .svc-badge.UNKN { background: var(--unkn-bg); color: var(--unkn-text); }

  .svc-msg {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
  }

  .svc-dur {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 10px;
    white-space: nowrap;
    color: var(--text-dim);
  }

  .svc-flags { font-size: 10px; }

  .host-link { cursor: pointer; }
  .host-link:hover { text-decoration: underline; color: #8fd19e; }

  .svc-clickable { cursor: pointer; border-radius: 4px; padding: 3px 4px; margin: 0 -4px; }
  .svc-clickable:hover { background: rgba(255,255,255,0.04); }

  /* === OK state === */
  .ok-message {
    text-align: center;
    padding: 80px 20px;
    font-size: 16px;
    color: #4a4;
  }
  .ok-message .sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .empty-filter {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* === Flat table view === */
  .flat-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 12px;
  }

  .flat-table th {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .flat-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .ft-row:hover { background: var(--surface2); }

  .ft-row-down { border-left: 2px solid var(--down-accent); }
  .ft-row-crit { border-left: 2px solid var(--crit-accent); }
  .ft-row-warn { border-left: 2px solid var(--warn-accent); }
  .ft-row-unkn { border-left: 2px solid var(--unkn-accent); }

  .ft-host-cell {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 11px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ft-svc-cell {
    font-weight: 600;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ft-msg-cell {
    color: var(--text-dim);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ft-dur-cell {
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 10px;
    white-space: nowrap;
    color: var(--text-dim);
    text-align: right;
  }



  /* === Options popover === */
  .opts-wrap {
    position: relative;
  }

  .opts-btn {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    line-height: 1;
  }

  .opts-btn:hover { border-color: #555; color: var(--text); }

  .opts-popover {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 30;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 0;
    min-width: 150px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .opts-popover.open { display: block; }

  .opts-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .opts-item:hover { background: var(--surface2); }

  .opts-check {
    font-size: 11px;
    color: #6b6;
    width: 16px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// Global state — survives across data refreshes
let rawData = null;
let baseUrl = '';
let hideAcked = false;
let hiddenStates = {};    // badge -> true if toggled off (e.g. "DOWN", "CRIT", "WARN", "UNKN")
let closedGroups = {};    // group id -> true if user collapsed it
let expandedHosts = {};   // "groupId/host" -> true if user expanded it
let currentUpdateInfo = null;
let updateBannerDismissed = false;
const FONT_SIZES = ['size-sm', 'size-md', 'size-lg'];
const FONT_LABELS = ['Aa-', 'Aa', 'Aa+'];
let fontSizeIndex = 0; // start at small (13px default with no class = between sm and md)
let viewMode = 'grouped'; // 'grouped' or 'flat'

function render(data) {
  rawData = data;
  if (data && data.base_url) baseUrl = data.base_url;
  redraw();
}

function openInCheckmk(host, service, site) {
  if (!baseUrl) return;
  let url;
  if (!service || service === 'Host Status') {
    url = baseUrl + '/check_mk/view.py?view_name=hoststatus&host=' + encodeURIComponent(host);
  } else {
    url = baseUrl + '/check_mk/view.py?view_name=service&host=' + encodeURIComponent(host) + '&service=' + encodeURIComponent(service);
  }
  if (site) url += '&site=' + encodeURIComponent(site);
  window.open(url, '_blank');
}

function saveUIState() {
  closedGroups = {};
  expandedHosts = {};
  document.querySelectorAll('.group').forEach(el => {
    const id = el.dataset.gid;
    if (id && !el.classList.contains('open')) closedGroups[id] = true;
  });
  document.querySelectorAll('.host-row.expanded').forEach(el => {
    const key = el.dataset.hkey;
    if (key) expandedHosts[key] = true;
  });
}

function redraw() {
  // Capture UI state before rebuilding DOM
  saveUIState();

  // Preserve font size class
  document.body.className = FONT_SIZES[fontSizeIndex] || '';

  const app = document.getElementById("app");
  const data = rawData;
  const bannerHtml = renderUpdateBanner();

  if (!data || !data.groups || data.groups.length === 0) {
    if (!data || !data.summary || data.summary.problem_count === 0) {
      app.innerHTML = `${bannerHtml}<div class="ok-message">All clear<div class="sub">No problems detected</div></div>`;
      bindUpdateBannerHandlers();
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.cmkstatus) {
        window.webkit.messageHandlers.cmkstatus.postMessage(0);
      }
      return;
    }
  }

  // Filter groups by removing acked/downtime items, then rebuild counts
  const filtered = filterGroups(data.groups);
  const totalProblems = filtered.reduce((n, g) => n + g.problem_count, 0);
  const totalHosts = new Set(filtered.flatMap(g => g.hosts.map(h => h.host))).size;

  // Count states from RAW data (so badges always show totals even when filtered)
  let downCount = 0, critCount = 0, warnCount = 0, unknCount = 0;
  for (const g of data.groups) {
    for (const h of g.hosts) {
      for (const svc of h.items) {
        if (hideAcked && svc.acknowledged) continue;
        const b = svc.state_badge;
        if (b === "DOWN") downCount++;
        else if (b === "CRIT") critCount++;
        else if (b === "WARN") warnCount++;
        else if (b === "UNKN") unknCount++;
      }
    }
  }

  let html = `${bannerHtml}<div class="header">
    <div class="left">
      <span class="brand">cmkview</span>
      <div class="filters">
        <button class="filter-btn" id="btn-view">${viewMode === 'flat' ? 'Table' : 'Groups'}</button>
        <div class="opts-wrap">
          <button class="opts-btn" id="btn-opts">⚙</button>
          <div class="opts-popover" id="opts-popover">
            <button class="opts-item" id="btn-ack"><span>Hide Acknowledged</span><span class="opts-check">${hideAcked ? '✓' : ''}</span></button>
            ${viewMode !== 'flat' ? `<button class="opts-item" id="btn-collapse"><span>${filtered.some(g => !closedGroups[g.id || (g.category + '-' + g.state)]) ? 'Collapse All' : 'Expand All'}</span><span class="opts-check"></span></button>` : ''}
            <button class="opts-item" id="btn-fontsize"><span>Font Size</span><span class="opts-check">${FONT_LABELS[fontSizeIndex]}</span></button>
          </div>
        </div>
      </div>
    </div>
    <span class="summary">
      <span>${totalHosts} hosts</span>
      <span>${totalProblems} problems</span>`;
  if (downCount || hiddenStates["DOWN"]) html += `<span class="badge down${hiddenStates['DOWN'] ? ' off' : ''}" data-state="DOWN">${downCount} DOWN</span>`;
  if (critCount || hiddenStates["CRIT"]) html += `<span class="badge crit${hiddenStates['CRIT'] ? ' off' : ''}" data-state="CRIT">${critCount} CRIT</span>`;
  if (warnCount || hiddenStates["WARN"]) html += `<span class="badge warn${hiddenStates['WARN'] ? ' off' : ''}" data-state="WARN">${warnCount} WARN</span>`;
  if (unknCount || hiddenStates["UNKN"]) html += `<span class="badge unkn${hiddenStates['UNKN'] ? ' off' : ''}" data-state="UNKN">${unknCount} UNKN</span>`;
  html += `</span></div><div class="content">`;

  if (filtered.length === 0) {
    html += '<div class="empty-filter">All problems filtered out — click badges or Hide Ack to adjust</div>';
  } else if (viewMode === 'flat') {
    html += renderFlatTable(filtered);
  } else {
    for (const g of filtered) {
      html += renderGroup(g);
    }
  }

  html += '</div>';
  app.innerHTML = html;
  bindUpdateBannerHandlers();

  // Update menu bar count (respects hideAcked and state filters)
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.cmkstatus) {
    window.webkit.messageHandlers.cmkstatus.postMessage(totalProblems);
  }

  // Options gear popover
  const optsBtn = document.getElementById('btn-opts');
  const optsPopover = document.getElementById('opts-popover');
  optsBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    optsPopover.classList.toggle('open');
  });
  document.addEventListener('click', () => optsPopover.classList.remove('open'));
  optsPopover.addEventListener('click', (e) => e.stopPropagation());

  // Hide Ack (inside popover)
  document.getElementById('btn-ack').addEventListener('click', (e) => {
    e.stopPropagation();
    hideAcked = !hideAcked;
    redraw();
  });

  // Collapse/Expand all (inside popover, only in grouped mode)
  const collapseBtn = document.getElementById('btn-collapse');
  if (collapseBtn) {
    collapseBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const groups = app.querySelectorAll('.group');
      const anyOpen = Array.from(groups).some(g => g.classList.contains('open'));
      if (anyOpen) {
        groups.forEach(g => g.classList.remove('open'));
        app.querySelectorAll('.host-row').forEach(h => h.classList.remove('expanded'));
        groups.forEach(g => { if (g.dataset.gid) closedGroups[g.dataset.gid] = true; });
        expandedHosts = {};
      } else {
        groups.forEach(g => g.classList.add('open'));
        closedGroups = {};
      }
      redraw();
    });
  }

  // Font size toggle (inside popover)
  document.getElementById('btn-fontsize').addEventListener('click', (e) => {
    e.stopPropagation();
    fontSizeIndex = (fontSizeIndex + 1) % FONT_SIZES.length;
    document.body.className = FONT_SIZES[fontSizeIndex];
    redraw();
  });

  // View mode toggle
  document.getElementById('btn-view').addEventListener('click', (e) => {
    e.stopPropagation();
    viewMode = viewMode === 'grouped' ? 'flat' : 'grouped';
    redraw();
  });

  // State badge toggle handlers
  app.querySelectorAll('.badge[data-state]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const state = el.dataset.state;
      hiddenStates[state] = !hiddenStates[state];
      redraw();
    });
  });

  // Group toggle handlers
  app.querySelectorAll('.group-header').forEach(el => {
    el.addEventListener('click', () => el.parentElement.classList.toggle('open'));
  });

  // Host toggle handlers
  app.querySelectorAll('.host-row').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.service-items')) return;
      if (e.target.closest('.host-link')) return;
      el.classList.toggle('expanded');
    });
  });

  // Click-to-open: host names
  app.querySelectorAll('.host-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openInCheckmk(el.dataset.host, null, el.dataset.site);
    });
  });

  // Click-to-open: service items
  app.querySelectorAll('.svc-clickable').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openInCheckmk(el.dataset.host, el.dataset.service, el.dataset.site);
    });
  });
}

function filterGroups(groups) {
  const hasStateFilter = Object.values(hiddenStates).some(v => v);
  if (!hideAcked && !hasStateFilter) return groups;

  const result = [];
  for (const g of groups) {
    const filteredHosts = [];
    for (const h of g.hosts) {
      const filteredItems = h.items.filter(svc => {
        if (hideAcked && svc.acknowledged) return false;
        if (hiddenStates[svc.state_badge]) return false;
        return true;
      });
      if (filteredItems.length === 0) continue;

      // Rebuild host entry with filtered items
      let worstDur = 0, worstDurStr = "0s", ackCount = 0, dtCount = 0;
      for (const svc of filteredItems) {
        if (svc.duration_seconds >= worstDur) {
          worstDur = svc.duration_seconds;
          worstDurStr = svc.duration || worstDurStr;
        }
        if (svc.acknowledged) ackCount++;
        if (svc.downtime) dtCount++;
      }
      filteredHosts.push({
        ...h,
        items: filteredItems,
        problem_count: filteredItems.length,
        worst_duration: worstDurStr,
        worst_duration_seconds: worstDur,
        acknowledged_count: ackCount,
        downtime_count: dtCount,
      });
    }
    if (filteredHosts.length === 0) continue;

    // Rebuild group with filtered hosts
    let gWorstDur = 0, gWorstDurStr = "0s";
    for (const h of filteredHosts) {
      if (h.worst_duration_seconds >= gWorstDur) {
        gWorstDur = h.worst_duration_seconds;
        gWorstDurStr = h.worst_duration || gWorstDurStr;
      }
    }
    const totalProblems = filteredHosts.reduce((n, h) => n + h.problem_count, 0);
    result.push({
      ...g,
      hosts: filteredHosts,
      host_count: filteredHosts.length,
      problem_count: totalProblems,
      worst_duration: gWorstDurStr,
      worst_duration_seconds: gWorstDur,
    });
  }
  return result;
}

function renderGroup(g) {
  const gid = g.id || (g.category + '-' + g.state);
  const isOpen = !closedGroups[gid];
  let html = `<div class="group${isOpen ? ' open' : ''}" data-gid="${esc(gid)}">
    <div class="group-header">
      <span class="group-icon">${esc(g.category_icon)}</span>
      <span class="group-title">${esc(g.category_label)}</span>
      <span class="group-meta">
        <span class="count">${g.host_count} host${g.host_count !== 1 ? 's' : ''}</span>
        <span>${g.problem_count} issue${g.problem_count !== 1 ? 's' : ''}</span>
        <span>${esc(g.worst_duration)}</span>
      </span>
      <span class="group-state ${g.state_badge}">${g.state_badge}</span>
      <span class="chevron">&#9654;</span>
    </div>
    <div class="group-body">`;

  for (const host of g.hosts) {
    let flags = '';
    if (host.acknowledged_count) flags += '✓';
    if (host.downtime_count) flags += '★';

    const hkey = gid + '/' + host.host;
    const isExpanded = expandedHosts[hkey];
    html += `<div class="host-row${isExpanded ? ' expanded' : ''}" data-hkey="${esc(hkey)}">
      <div class="host-header">
        <span class="host-name host-link" data-host="${esc(host.host)}" data-site="${esc(host.site)}">${esc(host.host)}</span>`;
    if (flags) html += `<span class="host-flags">${flags}</span>`;
    html += `<span class="host-meta">${host.problem_count} issue${host.problem_count !== 1 ? 's' : ''} &middot; ${esc(host.worst_duration)}</span>
      </div>
      <div class="service-items">`;

    for (const svc of host.items) {
      let svcFlags = '';
      if (svc.acknowledged) svcFlags += '✓';
      if (svc.downtime) svcFlags += '★';

      html += `<div class="svc-item svc-clickable" data-host="${esc(svc.host)}" data-service="${esc(svc.service)}" data-site="${esc(svc.site)}">
        <span class="svc-badge ${svc.state_badge}">${svc.state_badge}</span>
        <span class="svc-label">${esc(svc.service_label)}</span>
        <span class="svc-msg">${esc(svc.message)}</span>
        <span class="svc-dur">${esc(svc.duration)}</span>`;
      if (svcFlags) html += `<span class="svc-flags">${svcFlags}</span>`;
      html += `</div>`;
    }

    html += '</div></div>';
  }

  html += '</div></div>';
  return html;
}

function renderFlatTable(groups) {
  const rows = [];
  for (const g of groups) {
    for (const h of g.hosts) {
      for (const svc of h.items) {
        rows.push(svc);
      }
    }
  }

  // Severity first (DOWN > CRIT > WARN > UNKN), then oldest first within each
  const sevOrder = { DOWN: 0, CRIT: 1, WARN: 2, UNKN: 3 };
  rows.sort((a, b) => {
    const sa = sevOrder[a.state_badge] ?? 9;
    const sb = sevOrder[b.state_badge] ?? 9;
    if (sa !== sb) return sa - sb;
    return b.duration_seconds - a.duration_seconds;
  });

  let html = '<table class="flat-table"><thead><tr>';
  html += '<th style="width:44px">State</th>';
  html += '<th style="width:22%">Host</th>';
  html += '<th style="width:18%">Service</th>';
  html += '<th>Message</th>';
  html += '<th style="width:52px">Age</th>';
  html += '</tr></thead><tbody>';

  for (const row of rows) {
    let flags = '';
    if (row.acknowledged) flags += '✓';
    if (row.downtime) flags += '★';

    const sc = row.state_badge.toLowerCase();
    html += `<tr class="ft-row ft-row-${sc}">`;
    html += `<td><span class="svc-badge ${row.state_badge}">${row.state_badge}</span></td>`;
    html += `<td class="ft-host-cell">${esc(row.host)}${flags ? ` <span class="svc-flags">${flags}</span>` : ''}</td>`;
    html += `<td class="ft-svc-cell">${esc(row.service_label)}</td>`;
    html += `<td class="ft-msg-cell">${esc(row.message)}</td>`;
    html += `<td class="ft-dur-cell">${esc(row.duration)}</td>`;
    html += '</tr>';
  }

  html += '</tbody></table>';
  return html;
}

function renderUpdateBanner() {
  if (!currentUpdateInfo || updateBannerDismissed) return '';

  return `<div class="update-banner" id="update-banner">
    <div class="update-banner-text">
      <strong>cmkview v${esc(currentUpdateInfo.version)} available</strong> &mdash;
      <a href="${esc(currentUpdateInfo.url)}" target="_blank" rel="noreferrer">Download</a>
    </div>
    <button class="update-banner-dismiss" id="update-dismiss" aria-label="Dismiss update banner">&times;</button>
  </div>`;
}

function bindUpdateBannerHandlers() {
  const dismissButton = document.getElementById('update-dismiss');
  if (!dismissButton) return;
  dismissButton.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    updateBannerDismissed = true;
    redraw();
  });
}

function esc(s) {
  if (s == null) return "";
  const d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}

window.updateProblems = render;
window.showUpdateBanner = function(info) {
  if (!info || !info.version || !info.url) return;
  currentUpdateInfo = info;
  redraw();
};
</script>
</body>
</html>

name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt setuptools py2app

      - name: Build .app
        run: python setup.py py2app

      - name: Create DMG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/dmg_staging
          cp -R dist/cmkview.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create \
            -volname "cmkview" \
            -srcfolder dist/dmg_staging \
            -ov \
            -format UDZO \
            "dist/cmkview-${VERSION}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cmkview-*.dmg
          generate_release_notes: true
